<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MDMC</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.3.8/dist/purify.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --text-secondary: #a0a0a0;
            --primary-color: #bb86fc;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
        }
        .dashboard-container {
            padding: 20px 40px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .user-info { font-size: 0.9rem; }
        #logout-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .stat-card h3 {
            margin: 0 0 10px;
            font-size: 1rem;
            color: var(--text-secondary);
        }
        .stat-card p {
            margin: 0;
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        .chart-container, .actions-container {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        th { font-size: 0.9rem; color: var(--text-secondary); }
        .action-buttons button { padding: 5px 10px; font-size: 0.8rem; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>Dashboard</h1>
            <div class="user-info">
                Logged in as: <span id="user-email">...</span>
                <button id="logout-btn">Logout</button>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <h3>Total Smartlinks</h3>
                <p id="total-links">0</p>
            </div>
            <div class="stat-card">
                <h3>Total Clicks</h3>
                <p id="total-clicks">0</p>
            </div>
            <div class="stat-card">
                <h3>Conversion Rate</h3>
                <p id="conversion-rate">N/A</p>
            </div>
        </section>

        <section class="main-content">
            <div class="chart-container">
                <h2>Clicks per Smartlink</h2>
                <canvas id="clicks-chart"></canvas>
            </div>
            <div class="actions-container">
                <h2>Quick Actions</h2>
                <button id="create-new-btn">Create New Smartlink</button>
            </div>
        </section>

        <section class="links-table-container">
            <h2>Recent Smartlinks</h2>
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Artist</th>
                        <th>Slug</th>
                        <th>Clicks</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="links-tbody">
                    <!-- Rows will be injected here by JavaScript -->
                </tbody>
            </table>
        </section>

    </div>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>

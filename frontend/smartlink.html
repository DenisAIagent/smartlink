<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Smartlink - MDMC</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --text-secondary: #a0a0a0;
            --primary-color: #bb86fc;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--panel-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .form-step {
            display: none;
        }
        .form-step.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 12px;
            background-color: #2c2c2c;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            padding: 12px 20px;
            background-color: var(--primary-color);
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .artwork-preview {
            max-width: 150px;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create a New Smartlink</h1>

        <form id="create-smartlink-form">
            <!-- Step 1: Fetch Metadata -->
            <div id="step-1" class="form-step active">
                <h2>Step 1: Fetch Metadata</h2>
                <div class="form-group">
                    <label for="song-url">Enter a song URL (Spotify, Apple Music, etc.)</label>
                    <input type="url" id="song-url" placeholder="https://open.spotify.com/track/..." required>
                </div>
                <button type="button" id="fetch-btn">Fetch Metadata</button>
            </div>

            <!-- Step 2: Customize -->
            <div id="step-2" class="form-step">
                <h2>Step 2: Customize Your Link</h2>
                <div class="form-group">
                    <label>Artwork Preview</label>
                    <img id="artwork-preview" src="" alt="Artwork Preview" class="artwork-preview">
                </div>
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="artist">Artist Name</label>
                    <input type="text" id="artist" required>
                </div>
                <div class="form-group">
                    <h3>Platform Links</h3>
                    <div id="platform-links-container">
                        <!-- Links will be populated here -->
                    </div>
                </div>
                <button type="button" id="save-btn">Save Smartlink</button>
            </div>
        </form>

    </div>
    <script type="module" src="js/smartlink.js"></script>
</body>
</html>

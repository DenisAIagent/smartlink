<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MDMC Auth</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary-color: #bb86fc;
            --error-color: #cf6679;
            --success-color: #03dac6;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            width: 90%;
            max-width: 1200px;
            height: 80vh;
            max-height: 700px;
            background-color: var(--panel-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .login-panel, .debug-panel {
            padding: 40px;
            overflow-y: auto;
        }
        .login-panel {
            border-right: 1px solid var(--border-color);
        }
        h1 {
            color: var(--primary-color);
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-color);
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px;
            background-color: #2c2c2c;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(187, 134, 252, 0.3);
        }
        .password-strength {
            height: 5px;
            width: 100%;
            background: #333;
            border-radius: 5px;
            margin-top: 8px;
            display: flex;
        }
        .strength-bar {
            height: 100%;
            border-radius: 5px;
            transition: width 0.3s, background-color 0.3s;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #a764fa;
        }
        .debug-panel h2 {
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .debug-log {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #121212;
            padding: 15px;
            border-radius: 6px;
            height: 75%;
            overflow-y: auto;
        }
        .log-entry { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed var(--border-color); }
        .log-entry:last-child { border-bottom: none; }
        .log-title { font-weight: bold; color: var(--primary-color); }
        .log-body { color: var(--text-color); }
        .log-error { color: var(--error-color); }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-panel">
            <h1>Login</h1>
            <p>Enter your credentials to access the dashboard.</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                    <div class="password-strength">
                        <div class="strength-bar" id="strength-bar"></div>
                    </div>
                </div>
                <div class="form-group">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me" style="display: inline;">Remember me</label>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
        <div class="debug-panel">
            <h2>Real-time Debug Console</h2>
            <div class="debug-log" id="debug-log"></div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>

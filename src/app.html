<!doctype html>
<html lang="fr" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Primary Meta Tags -->
		<title>SmartLink - Liens Intelligents pour Artistes</title>
		<meta name="title" content="SmartLink - Liens Intelligents pour Artistes">
		<meta name="description" content="Service français de liens intelligents pour artistes indépendants. Créez des SmartLinks en moins de 60 secondes et partagez votre musique sur toutes les plateformes.">
		<meta name="keywords" content="smartlink, lien intelligent, musique, artiste, streaming, français">
		<meta name="author" content="SmartLink">
		<meta name="language" content="French">
		
		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website">
		<meta property="og:title" content="SmartLink - Liens Intelligents pour Artistes">
		<meta property="og:description" content="Service français de liens intelligents pour artistes indépendants. Créez des SmartLinks en moins de 60 secondes.">
		<meta property="og:site_name" content="SmartLink">
		<meta property="og:locale" content="fr_FR">
		
		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image">
		<meta property="twitter:title" content="SmartLink - Liens Intelligents pour Artistes">
		<meta property="twitter:description" content="Service français de liens intelligents pour artistes indépendants. Créez des SmartLinks en moins de 60 secondes.">
		
		<!-- Favicon -->
		<link rel="icon" href="/favicon.ico" sizes="32x32">
		<link rel="icon" href="/favicon.svg" type="image/svg+xml">
		<link rel="apple-touch-icon" href="/icon-192x192.png">
		<link rel="manifest" href="/manifest.json">
		
		<!-- Theme Color -->
		<meta name="theme-color" content="#1976d2" media="(prefers-color-scheme: light)">
		<meta name="theme-color" content="#1565c0" media="(prefers-color-scheme: dark)">
		
		<!-- Performance & Security -->
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="format-detection" content="telephone=no">
		<meta name="mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="default">
		
		<!-- Preload critical resources -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		
		<!-- Critical CSS -->
		<style>
			/* Critical loading styles */
			.app-loading {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: var(--pico-background-color, #fff);
				display: flex;
				align-items: center;
				justify-content: center;
				z-index: 9999;
			}
			
			.loading-spinner {
				width: 40px;
				height: 40px;
				border: 3px solid var(--pico-primary-background);
				border-top: 3px solid var(--pico-primary);
				border-radius: 50%;
				animation: spin 1s linear infinite;
			}
			
			@keyframes spin {
				0% { transform: rotate(0deg); }
				100% { transform: rotate(360deg); }
			}
		</style>
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" data-theme="light">
		<!-- Loading screen -->
		<div id="app-loading" class="app-loading">
			<div class="loading-spinner"></div>
		</div>
		
		<div style="display: contents">%sveltekit.body%</div>
		
		<!-- Remove loading screen once app is ready -->
		<script>
			document.addEventListener('DOMContentLoaded', function() {
				setTimeout(() => {
					const loading = document.getElementById('app-loading');
					if (loading) loading.remove();
				}, 1000);
			});
		</script>
	</body>
</html>

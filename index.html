<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jules's Smartlink</title>
    <!-- Dynamic OG tags will be injected here -->
    <meta property="og:title" content="Jules's Smartlink">
    <meta property="og:description" content="Listen on your favorite platform.">
    <meta property="og:image" content="">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.jsdelivr.net/npm/vibrant.js@1.0.0/dist/Vibrant.min.js"></script>

    <style>
        :root {
            --primary-color: #ffffff;
            --secondary-color: #f0f0f0;
            --accent-color: #ff4081;
            --background-color-light: rgba(255, 255, 255, 0.1);
            --background-color-dark: rgba(0, 0, 0, 0.2);
            --text-color: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --glow-color: rgba(255, 64, 129, 0.8);
            --font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            color: var(--text-color);
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .background-blur {
            position: fixed;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-size: cover;
            background-position: center;
            filter: blur(30px);
            z-index: -2;
            transform: scale(1.1);
        }

        .background-blur::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 100%);
            z-index: -1;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .card {
            background: var(--background-color-light);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 var(--shadow-color);
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .artwork-container {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            will-change: transform;
        }

        .artwork-container:hover {
            transform: scale(1.05);
        }

        #artwork {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .play-button-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: var(--primary-color);
        }

        .artwork-container:hover .play-button-overlay {
            opacity: 1;
        }

        .play-button-overlay svg {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            animation: pulse 2s infinite;
        }

        .artwork-container.playing .play-button-overlay {
            opacity: 1;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); }
            70% { transform: scale(1.1); }
            100% { transform: scale(0.95); }
        }

        #audio-visualizer {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 40px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .artwork-container.playing #audio-visualizer {
            opacity: 1;
        }

        .info h1 {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .info h2 {
            font-size: 1rem;
            font-weight: normal;
            color: var(--secondary-color);
            opacity: 0.8;
        }

        .platform-links {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 10px;
        }

        .platform-link {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .platform-link {
            will-change: transform, background-color, box-shadow;
        }

        .platform-link:hover, .platform-link:focus-visible {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--glow-color);
            outline: none;
        }

        .platform-logo {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            fill: currentColor;
        }

        .platform-name {
            flex-grow: 1;
            text-align: left;
            font-weight: 500;
        }

        .play-action {
            font-weight: bold;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        footer {
            position: absolute;
            bottom: 10px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        footer a {
            color: var(--text-color);
            text-decoration: none;
        }

        /* Mobile first */
        @media (min-width: 768px) {
            .card {
                max-width: 450px;
                padding: 40px;
            }
            .artwork-container {
                width: 250px;
                height: 250px;
            }
            .info h1 {
                font-size: 2rem;
            }
            .info h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="background-blur"></div>

    <main class="card">
        <div class="artwork-container" role="button" aria-label="Play audio preview">
            <img id="artwork" src="" alt="Album Artwork" loading="lazy">
            <div class="play-button-overlay">
                <svg class="play-icon" viewBox="0 0 100 100">
                    <path d="M 30,20 L 70,50 L 30,80 Z" fill="currentColor"/>
                </svg>
                 <svg class="pause-icon" viewBox="0 0 100 100" style="display: none;">
                    <rect x="30" y="25" width="15" height="50" fill="currentColor" />
                    <rect x="55" y="25" width="15" height="50" fill="currentColor" />
                </svg>
            </div>
            <canvas id="audio-visualizer"></canvas>
        </div>

        <div class="info">
            <h1 id="song-title"></h1>
            <h2 id="artist-name"></h2>
        </div>

        <div class="platform-links">
            <!-- Links will be injected here -->
        </div>

        <audio id="audio-preview" src=""></audio>
    </main>

    <footer>
        <p>Powered by <a href="https://odesli.co/" target="_blank">Odesli</a></p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const config = {
                songUrl: 'https://open.spotify.com/track/0DiWol3AO6WpXZgp0goxAV', // Daft Punk - One More Time
                // songUrl: 'https://music.apple.com/us/album/disorder/1440843642?i=1440843650', // Joy Division - Disorder
                // songUrl: 'https://tidal.com/browse/track/94796410', // Massive Attack - Teardrop
                apiUrl: 'https://api.song.link/v1-alpha.1/links?url=',
            };

            const domElements = {
                backgroundBlur: document.querySelector('.background-blur'),
                artwork: document.getElementById('artwork'),
                songTitle: document.getElementById('song-title'),
                artistName: document.getElementById('artist-name'),
                platformLinks: document.querySelector('.platform-links'),
                audioPreview: document.getElementById('audio-preview'),
                artworkContainer: document.querySelector('.artwork-container'),
                playIcon: document.querySelector('.play-icon'),
                pauseIcon: document.querySelector('.pause-icon'),
            };

            const platformLogos = {
                spotify: `<svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.43 17.51c-.225.362-.63.487-.992.262-2.908-1.75-6.562-2.125-10.938-1.157-.425.099-.85-.15-.949-.575-.1-.425.15-.85.575-.949 4.813-1.075 8.888-.637 12.112 1.312.363.225.488.63.263.999zm1.124-3.249c-.275.45-1.225.6-1.675.325-3.275-2-7.5-2.575-12.45-1.387-.525.125-.9-.275-1.025-.7-.125-.525.275-.9.7-1.025 5.475-1.287 10.2-0.637 13.887 1.575.45.275.6 1.225.325 1.675zm.1-3.55C14.13 8.35 7.688 8.137 4.463 9.15c-.6.175-1.2-.15-1.375-.75-.175-.6.15-1.2.75-1.375C7.913 5.9 15.113 6.15 19.263 8.55c.525.3.75 1.35.45 1.875-.3.525-1.35.75-1.875.45z"/></svg>`,
                appleMusic: `<svg viewBox="0 0 24 24"><path d="M18.322 17.025c.022-.016.04-.034.058-.053.018-.019.035-.038.05-.059.13-.163.24-.343.328-.536.088-.193.15-.394.188-.6a3.203 3.203 0 00-.012-1.272c-.03-.23-.083-.455-.16-.672a2.682 2.682 0 00-.27-.61c-.105-.2-.228-.387-.37-.558-.14-.17-.3-.322-.478-.455a2.43 2.43 0 00-.67-.323c-.25-.09-.51-.137-.776-.14h-.022a.998.998 0 00-.13.008.63.63 0 00-.097.018c-.24.043-.47.124-.68.243-.21.12-.4.274-.56.46-.16.188-.29.4-.39.63-.1.23-.16.47-.19.72-.03.25-.03.5-.01.75.02.25.07.49.14.73.07.24.17.46.29.67.12.21.27.4.44.57.17.17.36.32.57.44.21.12.44.22.68.29.24.07.49.12.74.14h.02c.26-.002.52-.05.77-.14a2.41 2.41 0 001.148-.778zm-5.38-2.337c.08-.2.13-.4.16-.6.03-.2.04-.4.02-.6s-.06-.39-.12-.58c-.06-.19-.15-.37-.25-.53s-.22-.31-.36-.44-.3-.24-.48-.33c-.18-.09-.37-.15-.57-.18-.2-.03-.4-.04-.6-.02s-.39.06-.58.12c-.19.06-.37.15-.53.25s-.31.22-.44.36c-.13.14-.24.3-.33.48-.09.18-.15.37-.18.57-.03.2-.04.4-.02.6s.06.39.12.58c.06.19.15.37.25.53s.22.31.36.44.3.24.48.33c.18.09.37.15.57.18.2.03.4.04.6.02s.39-.06.58-.12c.19-.06.37-.15.53-.25s.31-.22.44-.36c.13-.14.24-.3.33-.48zM12 2.37C12 2.37 12 2.37 12 2.37c-.63 0-1.2.1-1.69.28-.5.18-.94.44-1.32.75-.4.32-.72.7-.98 1.13s-.43.9-.52 1.4c-.03.17-.05.33-.05.5v.02h.01c.06-1.1 1.2-2.81 3.55-2.81.56 0 1.1.1 1.58.28.48.18.9.42 1.27.72.37.3.66.65.88 1.05.22.4.35.83.4 1.3.01.13.02.26.02.4V7.5h-.02c-.07-1.3-1.1-2.58-2.18-2.58-.55 0-1.04.14-1.46.4-.42.26-.77.62-1.04 1.06-.27.44-.46.95-.56 1.5-.1.55-.1 1.12-.02 1.7.08.58.25 1.13.5 1.64.25.5.58.95.98 1.33.4.38.85.7 1.35.94.5.24 1.03.36 1.6.36.6 0 1.16-.12 1.67-.34.5-.22.95-.53 1.33-.9.38-.38.7-.83.94-1.34.24-.5.4-1.05.48-1.62h-3.3v-2.13h5.42v.01c0 .06 0 .12-.01.18-.01.12-.02.23-.04.34-.1.57-.3.1.1-.5.1.42-.7.1.7-.2.25-1.04.38-1.48.38-1.92.24-2.28-.14-2.56-.6-2.7-1.1-2.7-1.6 0-.3.1-.5.2-.7.1-.2.2-.4.4-.5.2-.1.4-.2.6-.2s.4.1.6.2c.2.1.4.2.5.4.1.2.2.3.2.5.1.2.1.4.1.6 0 .04 0 .08-.01.12h-2.11v1.3h2.1c0 .05-.01.1-.01.15z"/></svg>`,
                youtubeMusic: `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 13.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5zm0-6c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0 11.5c-4.96 0-9-4.04-9-9s4.04-9 9-9 9 4.04 9 9-4.04 9-9 9zM12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.65 0-3-1.35-3-3s1.35-3 3-3 3 1.35 3 3-1.35 3-3 3z"/><path d="M12 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zM9.5 15.5l5-3-5-3z"/></svg>`,
                tidal: `<svg viewBox="0 0 24 24"><path d="M12 2L2 8v8l10 6 10-6V8l-10-6zm0 2.236L19.764 8 12 11.764 4.236 8 12 4.236zM4 9.36L11 14v6.64L4 16.36V9.36zm16 0v7l-7 4.24V14l7-4.64z"/></svg>`,
                deezer: `<svg viewBox="0 0 24 24"><path d="M2.1 8.25h2.925v2.325H2.1V8.25zm0 5.1h2.925v2.325H2.1v-2.325zm0-10.2h2.925v2.325H2.1V3.15zm5.55 0h2.925v17.7H7.65V3.15zm5.55 0h2.925v17.7h-2.925V3.15zm5.55 0h2.925v2.325h-2.925V3.15zm0 5.1h2.925v2.325h-2.925V8.25zm0 5.1h2.925v2.325h-2.925v-2.325zm0 5.1h2.925v2.325h-2.925v-2.325z"/></svg>`,
                amazonMusic: `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.44 14.37c-.36.36-.94.36-1.3 0l-3.14-3.14-3.14 3.14c-.36.36-.94.36-1.3 0s-.36-.94 0-1.3l3.14-3.14-3.14-3.14c-.36-.36-.36-.94 0-1.3s.94-.36 1.3 0l3.14 3.14 3.14-3.14c.36-.36.94-.36 1.3 0s.36.94 0 1.3l-3.14 3.14 3.14 3.14c.36.36.36.94 0 1.3zM15.5 4.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5z"/></svg>`,
            };

            const init = async () => {
                try {
                    const response = await fetch(`${config.apiUrl}${encodeURIComponent(config.songUrl)}`);
                    if (!response.ok) throw new Error('Failed to fetch song data');
                    const data = await response.json();

                    updatePageContent(data);
                    setupEventListeners();
                } catch (error) {
                    console.error('Error initializing page:', error);
                    domElements.songTitle.textContent = 'Error loading song';
                    domElements.artistName.textContent = 'Please try again later.';
                }
            };

            const updatePageContent = (data) => {
                const entity = data.entitiesByUniqueId[data.entityUniqueId];
                if (!entity) return;

                const { title, artistName, thumbnailUrl, apiProvider } = entity;
                const previewUrl = entity.previewUrl || (data.linksByPlatform.youtube && data.linksByPlatform.youtube.url);

                // Update text and images
                domElements.songTitle.textContent = title;
                domElements.artistName.textContent = artistName;

                domElements.artwork.crossOrigin = "Anonymous";
                domElements.artwork.src = thumbnailUrl;
                domElements.artwork.onload = () => {
                    Vibrant.from(domElements.artwork).getPalette((err, palette) => {
                        if (!err && palette) updateTheme(palette);
                    });
                };

                domElements.backgroundBlur.style.backgroundImage = `url(${thumbnailUrl})`;
                if (previewUrl) domElements.audioPreview.src = previewUrl;

                // Update OG meta tags
                document.querySelector('meta[property="og:title"]').setAttribute('content', title);
                document.querySelector('meta[property="og:description"]').setAttribute('content', `Listen to ${title} by ${artistName}`);
                document.querySelector('meta[property="og:image"]').setAttribute('content', thumbnailUrl);

                // Populate links
                domElements.platformLinks.innerHTML = '';
                for (const platform in data.linksByPlatform) {
                    if (platformLogos[platform]) {
                        const link = data.linksByPlatform[platform];
                        const linkEl = document.createElement('a');
                        linkEl.href = link.url;
                        linkEl.target = '_blank';
                        linkEl.classList.add('platform-link');
                        linkEl.setAttribute('aria-label', `Listen on ${platform}`);

                        linkEl.innerHTML = `
                            <div class="platform-logo">${platformLogos[platform]}</div>
                            <span class="platform-name">${link.nativeAppUriMobile ? platform.charAt(0).toUpperCase() + platform.slice(1) : platform.charAt(0).toUpperCase() + platform.slice(1)}</span>
                            <span class="play-action">Play</span>
                        `;
                        domElements.platformLinks.appendChild(linkEl);
                    }
                }
            };

            const updateTheme = (palette) => {
                if (!palette) return;
                const getRgbString = (s) => s ? `rgb(${s.rgb.join(',')})` : null;
                const getRgbaString = (s, a) => s ? `rgba(${s.rgb.join(',')}, ${a})` : null;

                const vibrant = getRgbString(palette.Vibrant);
                const darkMuted = getRgbString(palette.DarkMuted);
                const lightVibrant = getRgbString(palette.LightVibrant);
                const muted = getRgbString(palette.Muted);
                const isLight = (palette.Vibrant ? palette.Vibrant.hsl[2] : 0.5) > 0.6;
                const root = document.documentElement;

                root.style.setProperty('--accent-color', vibrant || muted || '#ff4081');
                root.style.setProperty('--glow-color', getRgbaString(palette.Vibrant, 0.8) || getRgbaString(palette.Muted, 0.8) || 'rgba(255, 64, 129, 0.8)');
                root.style.setProperty('--text-color', isLight ? darkMuted || '#000' : lightVibrant || '#fff');
                root.style.setProperty('--primary-color', isLight ? darkMuted || '#000' : lightVibrant || '#fff');
                root.style.setProperty('--secondary-color', isLight ? getRgbaString(palette.DarkMuted, 0.7) || 'rgba(0,0,0,0.7)' : getRgbaString(palette.LightVibrant, 0.7) || 'rgba(255,255,255,0.7)');
                root.style.setProperty('--background-color-light', isLight ? 'rgba(255, 255, 255, 0.3)' : 'rgba(0, 0, 0, 0.2)');
                document.querySelector('meta[name="theme-color"]').setAttribute('content', vibrant || muted);
            };

            let audioContext, analyser, source, dataArray;
            let isAudioInitialized = false;

            function initAudio() {
                if (isAudioInitialized || !domElements.audioPreview.src) return;
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                source = audioContext.createMediaElementSource(domElements.audioPreview);
                source.connect(analyser);
                analyser.connect(audioContext.destination);
                analyser.fftSize = 128;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isAudioInitialized = true;
                drawVisualizer();
            }

            function drawVisualizer() {
                requestAnimationFrame(drawVisualizer);
                if (!isAudioInitialized || domElements.audioPreview.paused) {
                    // Clear canvas when paused
                    const canvas = domElements.artworkContainer.querySelector('canvas');
                    const canvasCtx = canvas.getContext('2d');
                    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                    return
                };
                analyser.getByteFrequencyData(dataArray);
                const canvas = domElements.artworkContainer.querySelector('canvas');
                const canvasCtx = canvas.getContext('2d');
                const { width, height } = canvas;
                canvasCtx.clearRect(0, 0, width, height);
                const barWidth = (width / dataArray.length) * 1.5;
                let x = 0;
                for (const value of dataArray) {
                    const barHeight = (value / 255) * height * 0.5;
                    canvasCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary-color');
                    canvasCtx.fillRect(x, height - barHeight, barWidth, barHeight);
                    x += barWidth + 2;
                }
            }

            function setupEventListeners() {
                domElements.artworkContainer.addEventListener('click', () => {
                    if (!domElements.audioPreview.src) return;
                    if (!isAudioInitialized) initAudio();

                    if (domElements.audioPreview.paused) {
                        domElements.audioPreview.play();
                        domElements.artworkContainer.classList.add('playing');
                        domElements.playIcon.style.display = 'none';
                        domElements.pauseIcon.style.display = 'block';
                        domElements.artworkContainer.setAttribute('aria-label', 'Pause audio preview');
                    } else {
                        domElements.audioPreview.pause();
                        domElements.artworkContainer.classList.remove('playing');
                        domElements.playIcon.style.display = 'block';
                        domElements.pauseIcon.style.display = 'none';
                        domElements.artworkContainer.setAttribute('aria-label', 'Play audio preview');
                    }
                });

                domElements.audioPreview.addEventListener('ended', () => {
                    domElements.artworkContainer.classList.remove('playing');
                    domElements.playIcon.style.display = 'block';
                    domElements.pauseIcon.style.display = 'none';
                    domElements.artworkContainer.setAttribute('aria-label', 'Play audio preview');
                });
            }

            function initParticles() {
                const particlesContainer = document.getElementById('particles-js');
                if (!particlesContainer) return;

                const canvas = document.createElement('canvas');
                particlesContainer.appendChild(canvas);
                const ctx = canvas.getContext('2d');

                let particles = [];
                const particleCount = 50;

                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = Math.random() * 2 + 1;
                        this.speedX = Math.random() * 0.5 - 0.25;
                        this.speedY = Math.random() * 0.5 - 0.25;
                    }
                    update() {
                        this.x += this.speedX;
                        this.y += this.speedY;

                        if (this.size > 0.1) this.size -= 0.005;
                        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                    }
                    draw(color) {
                        ctx.fillStyle = color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                function animateParticles() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const particleColor = getComputedStyle(document.documentElement).getPropertyValue('--primary-color');

                    for (let i = 0; i < particles.length; i++) {
                        particles[i].update();
                        particles[i].draw(particleColor);
                        if (particles[i].size <= 0.1) {
                            particles.splice(i, 1);
                            i--;
                        }
                    }
                    while(particles.length < particleCount) {
                        particles.push(new Particle());
                    }

                    requestAnimationFrame(animateParticles);
                }
                animateParticles();

                window.addEventListener('resize', () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    particles = [];
                });
            }

            function registerPWA() {
                const manifest = {
                    "name": "Jules's Musical Smartlink",
                    "short_name": "Smartlink",
                    "start_url": ".",
                    "display": "standalone",
                    "background_color": "#000000",
                    "theme_color": "#000000",
                    "description": "An ultra-modern musical smartlink page.",
                    "icons": [{
                        "src": domElements.artwork.src,
                        "sizes": "512x512",
                        "type": "image/png"
                    }]
                };

                const manifestURL = 'data:application/json;base64,' + btoa(unescape(encodeURIComponent(JSON.stringify(manifest))));
                const manifestLink = document.querySelector('link[rel="manifest"]');
                if(manifestLink) manifestLink.setAttribute('href', manifestURL);

                if ('serviceWorker' in navigator) {
                    const swContent = `
                        const CACHE_NAME = 'smartlink-cache-v1';
                        const urlsToCache = [
                            '.',
                            'https://cdn.jsdelivr.net/npm/vibrant.js@1.0.0/dist/Vibrant.min.js',
                            '${domElements.artwork.src}'
                        ];
                        self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(urlsToCache))));
                        self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
                    `;
                    const swBlob = new Blob([swContent], { type: 'application/javascript' });
                    const swURL = URL.createObjectURL(swBlob);
                    navigator.serviceWorker.register(swURL).catch(e => console.error('SW registration failed: ', e));
                }
            }

            init();
            initParticles();

            // Register PWA after a delay to ensure artwork is loaded for the icon
            setTimeout(registerPWA, 2000);
        });
    </script>

</body>
</html>
